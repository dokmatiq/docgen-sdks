<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 240" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2d1f4e"/>
      <stop offset="100%" stop-color="#1a1233"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
  </defs>

  <!-- Icon (compact) -->
  <g transform="translate(20, 16)">
    <rect width="208" height="208" rx="64" fill="url(#bg)"/>
    <!-- Document silhouette -->
    <g opacity="0.7">
      <path d="M60 30 h60 l22 22 v104 a6 6 0 0 1 -6 6 H60 a6 6 0 0 1 -6-6 V36 a6 6 0 0 1 6-6Z" fill="#5a3d9e"/>
      <path d="M120 30 v16 a6 6 0 0 0 6 6 h16Z" fill="#7c5ecf"/>
      <rect x="70" y="62" width="60" height="3" rx="1.5" fill="#7c5ecf"/>
      <rect x="70" y="72" width="46" height="3" rx="1.5" fill="#7c5ecf"/>
      <rect x="70" y="82" width="64" height="3" rx="1.5" fill="#7c5ecf"/>
      <rect x="70" y="96" width="38" height="3" rx="1.5" fill="#7c5ecf"/>
      <rect x="70" y="106" width="52" height="3" rx="1.5" fill="#7c5ecf"/>
    </g>
    <!-- "IQ" foreground — weiter unten -->
    <text x="110" y="134" font-family="system-ui, sans-serif" font-weight="800" font-size="98" fill="url(#accent)" text-anchor="middle" dominant-baseline="central" letter-spacing="-3">IQ</text>
  </g>

  <!-- Wordmark -->
  <g transform="translate(264, 0)">
    <text y="138" font-family="'SF Pro Display', 'Inter', system-ui, sans-serif" font-weight="800" font-size="80" letter-spacing="4">
      <tspan fill="#e2e8f0">DOKMAT</tspan><tspan fill="url(#accent)">IQ</tspan>
    </text>
  </g>
</svg>
