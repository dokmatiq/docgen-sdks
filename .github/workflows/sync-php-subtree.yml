name: Sync PHP SDK to docgen-php

on:
  push:
    branches: [main]
    paths:
      - "php/**"
      - ".github/workflows/sync-php-subtree.yml"

concurrency:
  group: sync-php-subtree
  cancel-in-progress: false

jobs:
  split:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Split php/ subtree
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          SPLIT_SHA=$(git subtree split --prefix=php main)
          echo "SPLIT_SHA=${SPLIT_SHA}" >> "$GITHUB_ENV"

      - name: Push to dokmatiq/docgen-php
        env:
          GH_TOKEN: ${{ secrets.DOCGEN_PHP_PUSH_TOKEN }}
        run: |
          git push "https://x-access-token:${GH_TOKEN}@github.com/dokmatiq/docgen-php.git" \
            "${SPLIT_SHA}:refs/heads/main" --force
