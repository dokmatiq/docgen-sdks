name: Release Java to Maven Central

on:
  push:
    tags:
      - "java-v*"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run — sign artifacts but do not upload to Maven Central"
        type: boolean
        default: true

jobs:
  release:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: java
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Verify pom.xml version matches tag
        if: github.event_name == 'push'
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          TAG_VERSION="${TAG_NAME#java-v}"
          POM_VERSION=$(mvn -B -q -DforceStdout help:evaluate -Dexpression=project.version)
          if [ "$TAG_VERSION" != "$POM_VERSION" ]; then
            echo "Tag version ($TAG_VERSION) does not match pom.xml version ($POM_VERSION)"
            exit 1
          fi
          echo "Releasing version $POM_VERSION"

      - name: Import GPG signing key
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
        run: echo "$GPG_PRIVATE_KEY" | gpg --batch --import

      - name: Configure Maven settings
        env:
          SONATYPE_USERNAME: ${{ secrets.SONATYPE_USERNAME }}
          SONATYPE_PASSWORD: ${{ secrets.SONATYPE_PASSWORD }}
        run: |
          mkdir -p ~/.m2
          cat > ~/.m2/settings.xml <<'XMLEOF'
          <settings xmlns="http://maven.apache.org/SETTINGS/1.0.0">
            <servers>
              <server>
                <id>central</id>
                <username>${env.SONATYPE_USERNAME}</username>
                <password>${env.SONATYPE_PASSWORD}</password>
              </server>
            </servers>
          </settings>
          XMLEOF

      - name: Build and sign (dry run)
        if: github.event_name == 'workflow_dispatch' && inputs.dry_run
        env:
          MAVEN_GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: mvn -B -P release verify

      - name: Deploy to Maven Central
        if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && !inputs.dry_run)
        env:
          MAVEN_GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
          SONATYPE_USERNAME: ${{ secrets.SONATYPE_USERNAME }}
          SONATYPE_PASSWORD: ${{ secrets.SONATYPE_PASSWORD }}
        run: mvn -B -P release deploy
