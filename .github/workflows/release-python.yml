name: Release Python to PyPI

on:
  push:
    tags:
      - "python-v*"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run — build but don't upload"
        type: boolean
        default: true

# OIDC trusted publishing requires id-token: write
permissions:
  id-token: write
  contents: read

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Verify pyproject.toml version matches tag
        if: github.event_name == 'push'
        working-directory: python
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          TAG_VERSION="${TAG_NAME#python-v}"
          PYPROJECT_VERSION=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          if [ "$TAG_VERSION" != "$PYPROJECT_VERSION" ]; then
            echo "Tag version ($TAG_VERSION) does not match pyproject.toml version ($PYPROJECT_VERSION)"
            exit 1
          fi
          echo "Releasing version $PYPROJECT_VERSION"

      - name: Build sdist and wheel
        working-directory: python
        run: |
          pip install build
          python -m build

      - name: Twine check
        working-directory: python
        run: |
          pip install twine
          twine check dist/*

      - name: Publish to PyPI (Trusted Publisher OIDC)
        if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && !inputs.dry_run)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: python/dist
