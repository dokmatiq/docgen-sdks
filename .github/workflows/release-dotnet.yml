name: Release .NET to NuGet

on:
  push:
    tags:
      - "dotnet-v*"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run — pack but don't push"
        type: boolean
        default: true

jobs:
  release:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dotnet
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Verify csproj version matches tag
        if: github.event_name == 'push'
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          TAG_VERSION="${TAG_NAME#dotnet-v}"
          CSPROJ_VERSION=$(grep -oE '<Version>[^<]+</Version>' src/DocGen/DocGen.csproj | sed 's/<[^>]*>//g')
          if [ "$TAG_VERSION" != "$CSPROJ_VERSION" ]; then
            echo "Tag version ($TAG_VERSION) does not match csproj version ($CSPROJ_VERSION)"
            exit 1
          fi
          echo "Releasing version $CSPROJ_VERSION"

      - run: dotnet restore src/DocGen/DocGen.csproj
      - run: dotnet pack src/DocGen/DocGen.csproj --configuration Release --no-restore --output dist
      - name: List artifacts
        run: ls -la dist/

      - name: Push to NuGet
        if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && !inputs.dry_run)
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: dotnet nuget push 'dist/*.nupkg' --api-key "$NUGET_API_KEY" --source https://api.nuget.org/v3/index.json --skip-duplicate
